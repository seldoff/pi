<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digits of Pi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      position: fixed;
      top: 0;
      z-index: 10;
      background: #1a1a2e;
      width: 100%;
      padding: 16px 0 12px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    h1 { margin-bottom: 10px; }
    #legend {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 0 8px;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 0.8rem;
      color: #888;
    }
    .controls input[type="range"] {
      width: 120px;
      accent-color: #76b7b2;
    }
    #size-label {
      min-width: 36px;
      text-align: right;
    }
    .ctrl-btn {
      background: #333;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 3px 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .ctrl-btn:hover { background: #444; }
    .ctrl-select {
      background: #333;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    #gradient-controls { display: none; }
    #gradient-controls.active { display: flex; }
    #gradient-controls input[type="color"] {
      width: 32px;
      height: 24px;
      border: 1px solid #555;
      border-radius: 3px;
      background: none;
      cursor: pointer;
      padding: 0;
    }
    #gradient-legend {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      font-size: 0.8rem;
    }
    #gradient-legend.active { display: flex; }
    #gradient-bar {
      width: 200px;
      height: 16px;
      border-radius: 2px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
    }
    .legend-swatch {
      width: 16px;
      height: 16px;
      border-radius: 2px;
    }
    #scroll-spacer {
      width: 100%;
    }
    #canvas-wrap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: start;
      background: #1a1a2e;
      z-index: 1;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #tooltip {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-family: monospace;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.15s;
    }
  </style>
</head>
<body>
  <header>
    <h1 id="title">Digits of Pi</h1>
    <div id="legend"></div>
    <div id="gradient-legend"><span>0</span><canvas id="gradient-bar" width="200" height="16"></canvas><span>9</span></div>
    <div class="controls">
      <span>Square size:</span>
      <input type="range" id="size-slider" min="1" max="20" value="10">
      <span id="size-label">10px</span>
      <span style="margin-left: 16px;">Columns:</span>
      <input type="range" id="cols-slider" min="5" max="100" value="100">
      <span id="cols-label">100</span>
      <span style="margin-left: 16px;"><button id="mode-toggle" class="ctrl-btn">Gradient</button></span>
      <select id="palette-select" class="ctrl-select">
        <option value="" disabled hidden>Custom</option>
        <option value="tableau" selected>Tableau</option>
        <option value="rainbow">Rainbow</option>
        <option value="warm">Warm</option>
        <option value="cool">Cool</option>

        <option value="earth">Earth</option>
        <option value="neon">Neon</option>
        <option value="grayscale">Grayscale</option>
      </select>
      <button id="randomize-btn" class="ctrl-btn">Randomize</button>
    </div>
    <div class="controls" id="gradient-controls">
      <span>From:</span>
      <input type="color" id="color-from" value="#0a0a5c">
      <span style="margin-left: 8px;">To:</span>
      <input type="color" id="color-to" value="#f0e830">
      <button id="invert-btn" style="margin-left: 8px;" class="ctrl-btn">Invert</button>
    </div>
  </header>
  <div id="scroll-spacer">
    <div id="canvas-wrap">
      <canvas id="pi-canvas"></canvas>
    </div>
  </div>
  <div id="tooltip"></div>
  <script>
    // URL to fetch pi digits from (plain text, digits only or with non-digit chars stripped)
    const PI_DIGITS_URL = "https://raw.githubusercontent.com/seldoff/pi/refs/heads/main/pi.txt";

    const PALETTES = {
      tableau:   ['#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f','#edc948','#b07aa1','#ff9da7','#9c755f','#bab0ac'],
      rainbow:   ['#e6194b','#f58231','#ffe119','#3cb44b','#42d4f4','#4363d8','#911eb4','#f032e6','#fabed4','#a9a9a9'],
      warm:      ['#2d0000','#5c1010','#8b1a1a','#b33c24','#d4632a','#e8892f','#f5ac3e','#fcd062','#fff19a','#fffde0'],
      cool:      ['#001529','#002d52','#00487a','#0066a0','#1585c0','#3da5d9','#6cc4e8','#a0ddf0','#ceeef7','#eaf8fd'],

      earth:     ['#2d1b0e','#4a3222','#6b4c30','#8c6e4a','#a89070','#c4a882','#d4be9a','#e2d4b4','#f0e8d4','#faf5eb'],
      neon:      ['#ff0040','#ff4400','#ff9900','#ccff00','#00ff66','#00ffcc','#0099ff','#4400ff','#9900ff','#ff00cc'],
      grayscale: ['#111111','#222222','#444444','#555555','#777777','#888888','#aaaaaa','#bbbbbb','#dddddd','#eeeeee'],
    };
    let COLORS = [...PALETTES.tableau];

    let cell = 10;
    let cols = 100;
    let digits = '';
    let gradientMode = false;
    let gradientColors = []; // precomputed 10 hex strings

    const title = document.getElementById('title');
    const scrollSpacer = document.getElementById('scroll-spacer');
    const canvasWrap = document.getElementById('canvas-wrap');
    const canvas = document.getElementById('pi-canvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');
    const headerEl = document.querySelector('header');

    // Color helpers (OKLab interpolation for perceptually uniform gradients)
    function hexToLinear(hex) {
      const n = parseInt(hex.slice(1), 16);
      const r = ((n >> 16) & 255) / 255;
      const g = ((n >> 8) & 255) / 255;
      const b = (n & 255) / 255;
      // sRGB to linear
      const toLinear = c => c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
      return [toLinear(r), toLinear(g), toLinear(b)];
    }
    function linearToHex(rgb) {
      const toSrgb = c => c <= 0.0031308 ? 12.92 * c : 1.055 * Math.pow(c, 1 / 2.4) - 0.055;
      const clamp = v => Math.max(0, Math.min(255, Math.round(v * 255)));
      return '#' + rgb.map(c => clamp(toSrgb(c)).toString(16).padStart(2, '0')).join('');
    }
    function linearToOklab(rgb) {
      const [r, g, b] = rgb;
      const l = Math.cbrt(0.4122214708 * r + 0.5363325363 * g + 0.0514459929 * b);
      const m = Math.cbrt(0.2119034982 * r + 0.6806995451 * g + 0.1073969566 * b);
      const s = Math.cbrt(0.0883024619 * r + 0.2817188376 * g + 0.6299787005 * b);
      return [
        0.2104542553 * l + 0.7936177850 * m - 0.0040720468 * s,
        1.9779984951 * l - 2.4285922050 * m + 0.4505937099 * s,
        0.0259040371 * l + 0.7827717662 * m - 0.8086757660 * s,
      ];
    }
    function oklabToLinear(lab) {
      const [L, a, b] = lab;
      const l = (L + 0.3963377774 * a + 0.2158037573 * b) ** 3;
      const m = (L - 0.1055613458 * a - 0.0638541728 * b) ** 3;
      const s = (L - 0.0894841775 * a - 1.2914855480 * b) ** 3;
      return [
        +4.0767416621 * l - 3.3077115913 * m + 0.2309699292 * s,
        -1.2684380046 * l + 2.6097574011 * m - 0.3413193965 * s,
        -0.0041960863 * l - 0.7034186147 * m + 1.7076147010 * s,
      ];
    }
    function lerpColor(hex1, hex2, t) {
      const a = linearToOklab(hexToLinear(hex1));
      const b = linearToOklab(hexToLinear(hex2));
      const lab = a.map((v, i) => v + (b[i] - v) * t);
      return linearToHex(oklabToLinear(lab));
    }
    function computeGradientColors() {
      const from = document.getElementById('color-from').value;
      const to = document.getElementById('color-to').value;
      gradientColors = [];
      for (let i = 0; i < 10; i++) gradientColors.push(lerpColor(from, to, i / 9));
      updateGradientBar();
    }
    function updateGradientBar() {
      const bar = document.getElementById('gradient-bar');
      const bctx = bar.getContext('2d');
      const from = document.getElementById('color-from').value;
      const to = document.getElementById('color-to').value;
      const grad = bctx.createLinearGradient(0, 0, bar.width, 0);
      grad.addColorStop(0, from);
      grad.addColorStop(1, to);
      bctx.fillStyle = grad;
      bctx.fillRect(0, 0, bar.width, bar.height);
    }
    function randomHex() {
      return '#' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0');
    }
    function getColor(digit) {
      return gradientMode ? gradientColors[digit] : COLORS[digit];
    }

    // Build legend
    const legend = document.getElementById('legend');
    function buildLegend() {
      legend.innerHTML = '';
      COLORS.forEach((color, i) => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="legend-swatch" style="background:${color}"></div>${i}`;
        legend.appendChild(item);
      });
    }
    buildLegend();
    computeGradientColors();

    function totalRows() { return Math.ceil(digits.length / cols); }

    function headerH() { return headerEl.offsetHeight; }

    function updateLayout() {
      if (!digits.length) return;
      const fullHeight = totalRows() * cell + headerH() + cell;
      scrollSpacer.style.height = `${fullHeight}px`;
      canvasWrap.style.paddingTop = `${headerH()}px`;
      const viewH = window.innerHeight - headerH();
      canvas.width = cols * cell;
      canvas.height = Math.ceil(viewH / cell) * cell;
      canvas.style.width = `${cols * cell}px`;
      renderVisible();
    }

    function renderVisible() {
      if (!digits.length) return;
      const scrollOffset = Math.max(0, window.scrollY);
      const firstRow = Math.floor(scrollOffset / cell);
      const visibleRows = Math.ceil(canvas.height / cell);

      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let r = 0; r < visibleRows; r++) {
        const row = firstRow + r;
        if (row >= totalRows()) break;
        for (let c = 0; c < cols; c++) {
          const idx = row * cols + c;
          if (idx >= digits.length) break;
          ctx.fillStyle = getColor(+digits[idx]);
          ctx.fillRect(c * cell, r * cell, cell, cell);
        }
      }
    }

    let rafId = 0;
    function scheduleRender() {
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(renderVisible);
    }

    window.addEventListener('scroll', scheduleRender, { passive: true });
    window.addEventListener('resize', () => { updateSliderRanges(); updateLayout(); });

    // Fetch digits
    title.textContent = 'Loading Digits of Pi...';
    fetch(PI_DIGITS_URL)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(text => {
        digits = text.replace(/[^0-9]/g, '');
        title.textContent = `${digits.length.toLocaleString()} Digits of Pi`;
        updateSliderRanges();
        updateLayout();
      })
      .catch(err => { title.textContent = `Failed to load digits: ${err.message}`; });

    // Sliders
    const slider = document.getElementById('size-slider');
    const sizeLabel = document.getElementById('size-label');
    const colsSlider = document.getElementById('cols-slider');
    const colsLabel = document.getElementById('cols-label');

    function updateSliderRanges() {
      const maxCols = Math.max(5, Math.floor(window.innerWidth / cell));
      colsSlider.max = maxCols;
      if (cols > maxCols) { cols = maxCols; colsSlider.value = cols; colsLabel.textContent = cols; }

      const maxCell = Math.max(1, Math.floor(window.innerWidth / cols));
      slider.max = maxCell;
      if (cell > maxCell) { cell = maxCell; slider.value = cell; sizeLabel.textContent = `${cell}px`; }
    }

    slider.addEventListener('input', (e) => {
      cell = +e.target.value;
      sizeLabel.textContent = `${cell}px`;
      updateSliderRanges();
      updateLayout();
    });

    colsSlider.addEventListener('input', (e) => {
      cols = +e.target.value;
      colsLabel.textContent = cols;
      updateSliderRanges();
      updateLayout();
    });

    // Mode toggle
    const modeToggle = document.getElementById('mode-toggle');
    const gradientControlsEl = document.getElementById('gradient-controls');
    const gradientLegendEl = document.getElementById('gradient-legend');
    const colorFrom = document.getElementById('color-from');
    const colorTo = document.getElementById('color-to');
    modeToggle.addEventListener('click', () => {
      gradientMode = !gradientMode;
      modeToggle.textContent = gradientMode ? 'Categorical' : 'Gradient';
      gradientControlsEl.classList.toggle('active', gradientMode);
      gradientLegendEl.classList.toggle('active', gradientMode);
      legend.style.display = gradientMode ? 'none' : 'flex';
      updateLayout();
    });

    // Palette select
    const paletteSelect = document.getElementById('palette-select');
    paletteSelect.addEventListener('change', () => {
      COLORS = [...PALETTES[paletteSelect.value]];
      buildLegend();
      scheduleRender();
    });

    // Randomize (works for both modes)
    document.getElementById('randomize-btn').addEventListener('click', () => {
      if (gradientMode) {
        colorFrom.value = randomHex();
        colorTo.value = randomHex();
        computeGradientColors();
      } else {
        COLORS = Array.from({length: 10}, () => randomHex());
        paletteSelect.value = '';
        buildLegend();
      }
      scheduleRender();
    });
    colorFrom.addEventListener('input', () => { computeGradientColors(); scheduleRender(); });
    colorTo.addEventListener('input', () => { computeGradientColors(); scheduleRender(); });

    document.getElementById('invert-btn').addEventListener('click', () => {
      const tmp = colorFrom.value;
      colorFrom.value = colorTo.value;
      colorTo.value = tmp;
      computeGradientColors();
      scheduleRender();
    });
    // Hover tooltip
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const cx = Math.floor((e.clientX - rect.left) * scaleX / cell);
      const cy = Math.floor((e.clientY - rect.top) * scaleY / cell);

      const scrollOffset = Math.max(0, window.scrollY);
      const firstRow = Math.floor(scrollOffset / cell);
      const absRow = firstRow + cy;
      const idx = absRow * cols + cx;

      if (idx >= 0 && idx < digits.length && cx >= 0 && cx < cols) {
        tooltip.textContent = `Position ${(idx + 1).toLocaleString()}: digit ${digits[idx]}`;
        tooltip.style.opacity = '1';
      } else {
        tooltip.style.opacity = '0';
      }
    });
    canvas.addEventListener('mouseleave', () => {
      tooltip.style.opacity = '0';
    });
  </script>
</body>
</html>
