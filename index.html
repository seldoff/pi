<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digits of Pi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      position: fixed;
      top: 0;
      z-index: 10;
      background: #1a1a2e;
      width: 100%;
      padding: 16px 0 12px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 10px; }
    #legend {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 0 8px;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 0.8rem;
      color: #888;
    }
    .controls input[type="range"] {
      width: 120px;
      accent-color: #76b7b2;
    }
    #size-label {
      min-width: 36px;
      text-align: right;
    }
    .ctrl-btn {
      background: #333;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 3px 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .ctrl-btn:hover { background: #444; }
    #gradient-controls { display: none; }
    #gradient-controls.active { display: flex; }
    #gradient-controls input[type="color"] {
      width: 32px;
      height: 24px;
      border: 1px solid #555;
      border-radius: 3px;
      background: none;
      cursor: pointer;
      padding: 0;
    }
    #gradient-legend {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      font-size: 0.8rem;
    }
    #gradient-legend.active { display: flex; }
    #gradient-bar {
      width: 200px;
      height: 16px;
      border-radius: 2px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
    }
    .legend-swatch {
      width: 16px;
      height: 16px;
      border-radius: 2px;
    }
    #scroll-spacer {
      width: 100%;
    }
    #canvas-wrap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: start;
      background: #1a1a2e;
      z-index: 1;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #tooltip {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-family: monospace;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.15s;
    }
  </style>
</head>
<body>
  <header>
    <h1>Digits of Pi</h1>
    <p class="subtitle"></p>
    <div id="legend"></div>
    <div id="gradient-legend"><span>0</span><canvas id="gradient-bar" width="200" height="16"></canvas><span>9</span></div>
    <div class="controls">
      <span>Square size:</span>
      <input type="range" id="size-slider" min="1" max="20" value="10">
      <span id="size-label">10px</span>
      <span style="margin-left: 16px;">Columns:</span>
      <input type="range" id="cols-slider" min="5" max="100" value="100">
      <span id="cols-label">100</span>
      <span style="margin-left: 16px;"><button id="mode-toggle" class="ctrl-btn">Gradient</button></span>
    </div>
    <div class="controls" id="gradient-controls">
      <span>From:</span>
      <input type="color" id="color-from" value="#0a0a5c">
      <span style="margin-left: 8px;">To:</span>
      <input type="color" id="color-to" value="#f0e830">
      <button id="randomize-btn" style="margin-left: 8px;" class="ctrl-btn">Randomize</button>
    </div>
  </header>
  <div id="scroll-spacer">
    <div id="canvas-wrap">
      <canvas id="pi-canvas"></canvas>
    </div>
  </div>
  <div id="tooltip"></div>
  <script>
    // URL to fetch pi digits from (plain text, digits only or with non-digit chars stripped)
    const PI_DIGITS_URL = "https://raw.githubusercontent.com/seldoff/pi/refs/heads/main/pi.txt";

    const COLORS = [
      '#4e79a7', // 0 - steel blue
      '#f28e2b', // 1 - orange
      '#e15759', // 2 - red-coral
      '#76b7b2', // 3 - teal
      '#59a14f', // 4 - green
      '#edc948', // 5 - gold
      '#b07aa1', // 6 - purple
      '#ff9da7', // 7 - pink
      '#9c755f', // 8 - brown
      '#bab0ac', // 9 - warm gray
    ];

    let cell = 10;
    let cols = 100;
    let digits = '';
    let gradientMode = false;
    let gradientColors = []; // precomputed 10 hex strings

    const subtitle = document.querySelector('.subtitle');
    const scrollSpacer = document.getElementById('scroll-spacer');
    const canvasWrap = document.getElementById('canvas-wrap');
    const canvas = document.getElementById('pi-canvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');
    const headerEl = document.querySelector('header');

    // Color helpers
    function hexToRgb(hex) {
      const n = parseInt(hex.slice(1), 16);
      return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
    }
    function rgbToHex(r, g, b) {
      return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
    }
    function lerpColor(hex1, hex2, t) {
      const a = hexToRgb(hex1), b = hexToRgb(hex2);
      return rgbToHex(
        Math.round(a[0] + (b[0] - a[0]) * t),
        Math.round(a[1] + (b[1] - a[1]) * t),
        Math.round(a[2] + (b[2] - a[2]) * t)
      );
    }
    function computeGradientColors() {
      const from = document.getElementById('color-from').value;
      const to = document.getElementById('color-to').value;
      gradientColors = [];
      for (let i = 0; i < 10; i++) gradientColors.push(lerpColor(from, to, i / 9));
      updateGradientBar();
    }
    function updateGradientBar() {
      const bar = document.getElementById('gradient-bar');
      const bctx = bar.getContext('2d');
      const from = document.getElementById('color-from').value;
      const to = document.getElementById('color-to').value;
      const grad = bctx.createLinearGradient(0, 0, bar.width, 0);
      grad.addColorStop(0, from);
      grad.addColorStop(1, to);
      bctx.fillStyle = grad;
      bctx.fillRect(0, 0, bar.width, bar.height);
    }
    function getColor(digit) {
      return gradientMode ? gradientColors[digit] : COLORS[digit];
    }

    // Build legend
    const legend = document.getElementById('legend');
    COLORS.forEach((color, i) => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<div class="legend-swatch" style="background:${color}"></div>${i}`;
      legend.appendChild(item);
    });
    computeGradientColors();

    function totalRows() { return Math.ceil(digits.length / cols); }

    function headerH() { return headerEl.offsetHeight; }

    function updateLayout() {
      if (!digits.length) return;
      const fullHeight = totalRows() * cell + headerH() + cell;
      scrollSpacer.style.height = `${fullHeight}px`;
      canvasWrap.style.paddingTop = `${headerH()}px`;
      const viewH = window.innerHeight - headerH();
      canvas.width = cols * cell;
      canvas.height = Math.ceil(viewH / cell) * cell;
      canvas.style.width = `${cols * cell}px`;
      renderVisible();
    }

    function renderVisible() {
      if (!digits.length) return;
      const scrollOffset = Math.max(0, window.scrollY);
      const firstRow = Math.floor(scrollOffset / cell);
      const visibleRows = Math.ceil(canvas.height / cell);

      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let r = 0; r < visibleRows; r++) {
        const row = firstRow + r;
        if (row >= totalRows()) break;
        for (let c = 0; c < cols; c++) {
          const idx = row * cols + c;
          if (idx >= digits.length) break;
          ctx.fillStyle = getColor(+digits[idx]);
          ctx.fillRect(c * cell, r * cell, cell, cell);
        }
      }
    }

    let rafId = 0;
    function scheduleRender() {
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(renderVisible);
    }

    window.addEventListener('scroll', scheduleRender, { passive: true });
    window.addEventListener('resize', () => { updateSliderRanges(); updateLayout(); });

    // Fetch digits
    subtitle.textContent = 'Loading digits...';
    fetch(PI_DIGITS_URL)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(text => {
        digits = text.replace(/[^0-9]/g, '');
        subtitle.textContent = `${digits.length.toLocaleString()} digits visualized as colored squares`;
        updateSliderRanges();
        updateLayout();
      })
      .catch(err => { subtitle.textContent = `Failed to load digits: ${err.message}`; });

    // Sliders
    const slider = document.getElementById('size-slider');
    const sizeLabel = document.getElementById('size-label');
    const colsSlider = document.getElementById('cols-slider');
    const colsLabel = document.getElementById('cols-label');

    function updateSliderRanges() {
      const maxCols = Math.max(5, Math.floor(window.innerWidth / cell));
      colsSlider.max = maxCols;
      if (cols > maxCols) { cols = maxCols; colsSlider.value = cols; colsLabel.textContent = cols; }

      const maxCell = Math.max(1, Math.floor(window.innerWidth / cols));
      slider.max = maxCell;
      if (cell > maxCell) { cell = maxCell; slider.value = cell; sizeLabel.textContent = `${cell}px`; }
    }

    slider.addEventListener('input', (e) => {
      cell = +e.target.value;
      sizeLabel.textContent = `${cell}px`;
      updateSliderRanges();
      updateLayout();
    });

    colsSlider.addEventListener('input', (e) => {
      cols = +e.target.value;
      colsLabel.textContent = cols;
      updateSliderRanges();
      updateLayout();
    });

    // Mode toggle
    const modeToggle = document.getElementById('mode-toggle');
    const gradientControlsEl = document.getElementById('gradient-controls');
    const gradientLegendEl = document.getElementById('gradient-legend');
    modeToggle.addEventListener('click', () => {
      gradientMode = !gradientMode;
      modeToggle.textContent = gradientMode ? 'Categorical' : 'Gradient';
      gradientControlsEl.classList.toggle('active', gradientMode);
      gradientLegendEl.classList.toggle('active', gradientMode);
      legend.style.display = gradientMode ? 'none' : 'flex';
      updateLayout();
    });
    const colorFrom = document.getElementById('color-from');
    const colorTo = document.getElementById('color-to');
    colorFrom.addEventListener('input', () => { computeGradientColors(); scheduleRender(); });
    colorTo.addEventListener('input', () => { computeGradientColors(); scheduleRender(); });

    function randomHex() {
      return '#' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0');
    }
    document.getElementById('randomize-btn').addEventListener('click', () => {
      colorFrom.value = randomHex();
      colorTo.value = randomHex();
      computeGradientColors();
      scheduleRender();
    });

    // Hover tooltip
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const cx = Math.floor((e.clientX - rect.left) * scaleX / cell);
      const cy = Math.floor((e.clientY - rect.top) * scaleY / cell);

      const scrollOffset = Math.max(0, window.scrollY);
      const firstRow = Math.floor(scrollOffset / cell);
      const absRow = firstRow + cy;
      const idx = absRow * cols + cx;

      if (idx >= 0 && idx < digits.length && cx >= 0 && cx < cols) {
        tooltip.textContent = `Position ${(idx + 1).toLocaleString()}: digit ${digits[idx]}`;
        tooltip.style.opacity = '1';
      } else {
        tooltip.style.opacity = '0';
      }
    });
    canvas.addEventListener('mouseleave', () => {
      tooltip.style.opacity = '0';
    });
  </script>
</body>
</html>
